# Fallback nixpacks config (if Dockerfile build is disabled).
# Railway will normally pick backend/Dockerfile via railway.json.

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHONUNBUFFERED = "1"
DATABASE_URL = "sqlite:////app/data/auksionwatch.db"
ALLOWED_ORIGINS = "*"
